<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="200" viewBox="0 0 400 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="200" fill="white"/>
  
  <!-- Icon from Design 9 - Layered pages -->
  <g transform="translate(100, 100)">
    <!-- Bottom layer -->
    <rect x="-45" y="-40" width="90" height="90" rx="8" fill="#D1C4E9" transform="rotate(-5)"/>
    
    <!-- Middle layer -->
    <rect x="-42" y="-42" width="84" height="90" rx="8" fill="#B39DDB" transform="rotate(2)"/>
    
    <!-- Top layer -->
    <rect x="-40" y="-45" width="80" height="90" rx="8" fill="url(#gradient9)"/>
    
    <!-- N on top page -->
    <path d="M -25 -30 L -25 30 L -13 30 L -13 -5 L 13 30 L 25 30 L 25 -30 L 13 -30 L 13 5 L -13 -30 Z" fill="white"/>
    
    <!-- Page lines -->
    <line x1="-30" y1="10" x2="30" y2="10" stroke="white" stroke-width="1.5" opacity="0.3"/>
    <line x1="-30" y1="20" x2="30" y2="20" stroke="white" stroke-width="1.5" opacity="0.3"/>
    <line x1="-30" y1="30" x2="20" y2="30" stroke="white" stroke-width="1.5" opacity="0.3"/>
  </g>
  
  <!-- Text: Notexa (from Design 6 style) -->
  <text x="200" y="120" font-family="Arial, sans-serif" font-size="60" font-weight="700" fill="#2C3E50">
    Notexa
  </text>
  
  <defs>
    <linearGradient id="gradient9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C4DFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#651FFF;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
